h, den kommer liksom av sig\nGu, va du ä grann, ah, låter inge bra\nnär man en kvinna med storm vill ta\noh du får inte kyssa eller smeka hennes hy\nom du låter som en Motala-wevy\nFör finnar och wyssar och Linköpingsbor\ndi har de väwe än du nånsin tror\noh de blir inge wajwaj när lampa i shläckt\nom du har en ful dialekt\nFor finnar och wyssar och linköpingsbor\ndi har de väwe än du nånsin tror\noh de blir inge wajwaj nar lampa ä shläckt\nom du har en ful dialekt, take it Klasse!\nOm du har en ful dialekt aoo\n.\n123\nVästmanlands-Dala nation: Ris-Jerk\nSå går vi till Ris-Jerk och tager oss en sup.\nDet gör så gott i magen att få ett litet rus.\n/: Ja, jag lovar liv och död,\natt på mig går ingen nöd,\nså länge det finns brännvin och\nkullor i överflöd. :/\nAv tradition sjunger Andre kuratorer i Uppsala en modifierad\nversion där ”kullor” har bytts ut mot ”pengar”\nGotlands nation: Takk för supen\nTakk för supen, sum ja fikk!\nDän gikk lustit nidar.\nSätted magen äi gutt skikk.\nkrupp u allä lidar.\nTakk för supen, dän va bra!\nFlairä släikä vill ja ha.\nGi mi äin, äin, äin!\nGi mi täu, täu, täu!\nGi mi täu, gì mi tre, gì mi föirä,\ntìi däss ja far min höirä.\nSå livum vör äi samä trou\nsum folki äi vår körkä.\nU var vör byggar, var vör bour,\n124\nså skall uss supen störkä.\nSå drikkum vör mä ett friskt mål\nallä vakkrä töisars skål.\nSkål för dän, dän, dän,\nskål för sum, sum, sum,\nskål för dän sum glassä töimar,\nu ingen drupä glåimar!\nKalmar nation i Lund: En liten tax\nEn liten tax.\nEn fin gitarr.\nEn relation.\nEn filial.\nEn fisketur i Kalmarsund\ni glada vänners lag.\nEn boll.","Melodi: Tre trallande jäntor"],["Fattig Bonddräng","Astrid Lindgren",3,0,[],"Jag är fattig bonddräng men jag lever ändå.\nDagar går och kommer medan jag knogar på,\nharvar, sår och plöjer, mockar, gräver och bär,\ngår bak mina oxar hojtar visslar och svär.\nJag är fattig bonddräng och jag tuggar mitt snus,\noch när lördan kommer vill jag ta mig ett rus.\nSen när jag blitt livad, vill jag tampas och slåss,\nvila hos en flicka vill jag också förstås.\nSen så kommer söndan och då vill våran präst,\natt jag ska i körkan men då sover jag mest.\nPrästen kan väl sova hela måndagen men\nför en fattig bonddräng börjar knoget igen.\nSå går hela veckan alla dagar och år,\njag går med min lie och jag plöjer och sår.\nJag kör mina oxar och jag hässjar mitt hö,\nharvar, gnor och trälar, och till sist ska jag dö.\nStår där, fattig bonddräng, invid himmelens port,\nlite rädd och ledsen för de synder jag gjort.\nMan ska inte supa, hålls med flickor och slåss.\nHerren Gud i himlen är väl missnöjd förstås.","Text: Astrid Lindgren | Musik: Georg Riedel"],["Kattvisan","Astrid Lindgren",3,0,[],"’Tänk jag drömde i natt\natt jag hade en katt.\nOch han åt bara sill och potäter.\nDu får trot om du vill,\nmen potäter och sill,\ndet är just vad små kattungar äter.\nTänk jag drömde i natt\natt jag hade en katt\noch han svängde på rumpari i dansen.\nDu får trot om du vill,\nmen det hör liksom till\natt små kattungar svänger på svansen.\nTänk jag drömde i natt\natt jag hade en katt.\nOj vad den kunde bitas och fräsa.\nDu får trot om du vill,\nmen just så gick det till\nnär den rackarn bet av mej min näsa.\nOppochner-visan\nOpp och ner\nner och opp\ngrisen gal i granens topp\noch en mus\n130\ni vårt hus svär och tuggar snus.\nLammet skäller,\nvärper karameller,\nhunden jamar,\nlilla grisen gal.\nOpp och ner\nner och opp\ngrisen gal i granens topp\noch vår ko,\nmå ni tro,\nhon ska ut och ro.\nGeten dansar,\ntuppen har fem svansar,\noxen kacklar,\nlilla grisen gal.\nOpp och ner\nner och opp\ngrisen gal i granens topp\noch vår katt\nhan tror att\nmyssan är en hatt.\nHönan jagar\nräv i våra hagar,\nkossan gnäggar,\nlilla grisen gal.\nOpp och ner\nner och opp\ngrisen gal i granens topp\noch vår stut\nflyger ut.\nNu är visan slut.","Text: Astrid Lindgren | Musik: Lille-Bror Söderlundh | Text: Astrid Lindgren | Musik: Georg Riedel"],["Här kommer Pippi Långstrump","Astrid Lindgren",3,0,[],"Här kommer Pippi Långstrump,\ntjolahopp tjolahej tjolahoppsan-sa,\nhär kommer Pippi Långstrump,\nja, här kommer faktiskt jag.\nHar du sett min apa,\nmin söta fina lilla apa,\nhar du sett Herr Nilsson,\nja, han heter faktiskt så.\nHar du sett min villa,\nmin Villa Villekulla-villa,\nvill å vill du veta,\nvarför villan heter så?\nJo, för där bor ju Pippi Långstrump,\ntjolahopp tjolahej tjolahoppsan-sa,\ndär bor ju Pippi Långstrump,\nja, där bor faktiskt jag.\nDet är inte illa,\njag har ju apa häst och villa,\nen kappsäck full med pengar\ndet är också bra att ha.","Text: Astrid Lindgren | Musik: Jan Johansson"],["Kom nu, alla vänner,","Astrid Lindgren",3,0,[],"varenda kotte som jag känner,\nnu ska vi leva loppan,\ntjolahej tjolahoppsan-sa.\nHär kommer Pippi Långstrump,\ntjolahopp tjolahej tjolahoppsan-sa,\nhär kommer Pippi Långstrump,\nja, här kommer faktiskt jag.\nPippis sommarvisa\nOch nu så vill jag sjunga att sommaren är skön\noch träden är så fina och marken är så grön.\nOch blommorna är vackra och höet luktar gott\noch solen är så solig och vattnet är så vått.\nOch lilla fågeln flyger i boet ut och in\noch därför vill jag sjunga att sommaren är min.\nOch jag vill också sjunga att fjärilar är bra\noch alla söta myggor dom vill jag också ha.\nOch jag är brun om bena precis som det ska va\noch därför vill jag sjunga att bruna ben är bra.\nOch jag har nya fräknar och prickigt sommarskinn\noch därför vill jag sjunga att sommaren är min.","Text: Astrid Lindgren | Musik: Georg Riedel"],["Idas Sommarvisa","Astrid Lindgren",3,0,[],"Du ska inte tro det blir sommar\nIfall inte nån sätter fart\nPå sommarn och gör lite somrigt\nDå kommer blommorna snart\nJag gör så att blommorna blommar\nJag gör hela kohagen grön\nOch nu så har sommaren kommit\nFör jag har just tagit bort snön\nJag gör mycket vatten i bäcken\nSå där så det hoppar och far\nJag gör fullt med svalor som flyger\nOch myggor som svalorna tar\nJag gör löven nya på träden\nOch små fågelbon här och där\nJag gör himlen vacker om kvällen\nFör jag gör den alldeles skär\nOch smultron det gör jag åt barnen\nFör det tycker jag dom kan få\nOch andra små roliga saker\nSom passar när barnen är små\nOch jag gör så roliga ställen\nDär barnen kan springa omkring\n134\nDå blir barnen fulla med sommar\nOch benen blir fulla med spring\ntra-la-la-la-la-la\nvill du tralla ska du tralla så, just så.\nNu ska du höra nånting som jag vill tala om,\njag såg en pojke nyss, och det var våren som kom.\nNu är våren kommen,\nnu är våren kommen,\nalla pojkar börjar vissla då, just då.\n(Vissling, vissling, vissling,\nvissling, vissling, vissling)\nVill du vissla ska du vissla så, just så.","Text: Astrid Lindgren | Musik: Georg Riedel"],["Pilutta-visan","Astrid Lindgren",3,0,[],"Madicken, Madicken, pilutta dig, pilutta dig,\njag vet nånting hemligt som bara är för mig.\nPilutta, pilutta, jag säger inte vad det ä´,\npilutta, fast du vill nog gärna veta de´,\npilutta dej, en hemlighet,\npilutta dej, som ingen, ingen vet,\noch ingen på jorden får heller veta det.\nFast det förstås, om du är snäll\noch ger mig en och annan karamell,\nså kanske, så kanske jag säger det i kväll.\nOj, vad du är barnslig, du stackars lilla Lisabeth!\nJag struntar väl blankt i din dumma hemlighet.\nDet är nånting fånigt, det slår jag mig i backen på,\noch vad det än är får jag veta det ändå.\nPilutta dej, pilutta dej,\njag vet att du berättar det för mig,\ndet kan jag slå vad om, jo för jag känner dig.\nJag vet att redan nu i kväll,\nså bubblar allting ur dig med en smäll,\ndet går ju så bra utan minsta karamell.\nDu tror det ä fånigt, men det ä tvärtom nånting bra,\noch jag fick ju veta`t av mamma i dag.\nAv mamma - vad då då? Då vill jag också veta de`,\n136\nberätta nu genast, berätta vad det ä.\nNej, vet du va`, vad mamma sa,\natt jag fick inte säga vad det va,\ndet får du ju se när det blir din fölseda`,\nmen tänk nu om du skulle få\nen sidenhatt med skära rosor på?\nMen jag säger inget, det måste du förstå.\nPilutta dig, pilutta dig\npilutta dig, pilutta dig och mig\npilutta, pilutta, pilutta dig och mig.","Text: Astrid Lindgren | Musik: Bengt Hallberg"],["Sjörövar-Fabbe","Astrid Lindgren",3,0,[],"Sjörövar-Fabbe, farfars far,\när minsann en sjusärdeles karl,\nkring alla hav han far och far,\ntjohej hadelittan lej.\nSjörövaryrket passar'n bra.\n\"Det är bara att röva och ta,\noch det\", sa Fabbe, \"gillarjag,\ntjohej hadelittan lej.\"\nMen då ...\nvad står på?\nFabbe blir plötsligt blek och grå!\nOj då!\nVad står på,\noj oj oj oj oj oj Oj!\n(Oj, oj, oj, oj, oj, oj, Oj!)\nSjörövar-Fabbe, farfars far,\när minsann en sjusärdeles karl,\nmen han är sjösjuk alla dar,\ntjohej hadelittan lej.\nStormen ryter och åskan går,\nhavet brusar och seglena slår,\nner i kajutan Fabbe går,\n138\ntjohej hadelittan lej.\nKräks och svär och mår inte bra.\n\"Bättre väder det vill jag nog ha,\nannars\", sa Fabbe, slutarjag\",\ntjohej hadelittan lej.\"\nMen då ...\nvad står på?\nFabbe blir plötsligt blek och grå!\nOj då!\nVad står på,\noj oj oj oj oj oj Oj!\n\"Dä nåt ingen mänska förstår,\nvarför alltid så illa jag mår,\nbara båten guppar och går,\ntjohej hadelittan lej.\"\nSjörövar-Fabbe, farfars far\när minsann en sjusärdeles karl,\nkring alla hav han far och far,\ntjohej hadelittan lej.","Text: Astrid Lindgren | Musik: Georg Riedel"],["Du käre lille snickerbo","Astrid Lindgren",3,0,[],"Du käre lille snickerbo'\nhär kommer jag igen.\nNu är det bråttom kan du tro,\nnu är det klippt igen.\nSnickerboa hopp fallera,\nå snickerboa hopp fallerej,\när bra att ha, hopp fallera,\nför stackers mej,\nhopp fallerej.\nTill snickerboa ränner jag\nnär det är nåt jag gjort.\nMen far min löper också bra\nfast inte lika fort.\nSnickerboa hopp fallera…\nDet får bli slut med mine hyss\nhar far min sagt ifrån.\nJag gjorde ett alldeles nyss\nsom visst tog knäcken på'n!\nSnickerboa hopp fallera…\nDu käre lille snickerbo'\nvad jag är glad åt dej!\nNu sitter jag i lugn å ro\nå bare viler mej.\nSnickerboa hopp fallera…","Text: Astrid Lindgren | Musik: Georg Riedel"],["Luffarvisan","Astrid Lindgren",3,0,[],"Se på luffarn som går där på vägen,\nse på luffarn Guds lille fyr.\nSå snart som det blir vår\ngår han ut och går\nför att söka sig äventyr.\nHan går så långt som vägarna räcker,\nhan har en oro och en längtan i sitt blod.\nOch när som sola skin\ndå far vanvett i'n,\ndet är det som ger honom hans mod.\nHan vill va fri som en fågel,\nfri som en fågel.\nOch då är det som\nnånting ropar; - Kom!,\ni hans galna luffareblod.\nHan vill va fri som en fågel,\nfri som en fågel.\nOch då är det som\nnånting ropar; - Kom!,\ni hans galna luffareblod.\n141\nRÖVARSÅNGEN\n142\nSång N:o 17 ur Bacchi Tempel\nText och musik: Carl Michael Bellman\nBort allt vad oro gör,\nbort allt vad hjärtat kväljer!\nBäst att man väljer\nbland dessa buteljer\nsin maglikör.\n/: Granne! Gör du just som jag gör,\nvet denna oljan ger humör.\nVad det var läckert!\nVad var det? Rhenskt Bläckert?\nOui Monseigneur. :/\nBort allt vad oro gör,\nallt är ju stoft och aska,\nlåt oss bli raska,\noch tömma vår flaska\nbland bröderna.\n/: Granne! Gör du just som jag gör,\nvet denna oljan ger humör.\nVad det var mäktigt!\nVad var det? ... Jo präktigt,\nMalaga - ja. :/\n145\nFredmans epistel N:o 2 Nå skruva fiolen…\nText och musik: Carl Michael Bellman\nNå skruva Fiolen, Hej! Spelman skynda dej.\nKära Syster, hej! Svara inte nej,\nsvara ”Ja”, så bli vi glada.\nSätt dig du på stolen, och stryk din silversträng;\nRöda stråken släng, och med armen sväng;\nGör ej fiolen skada.\nDu svettas, stor sak, i brännvin skall du bada;\nTy under detta tak, är Bacchi lada,\n- - - Ganska riktigt,\nDitt kall är viktigt, båd för öra, syn och smak.\nBland nymfernas skara, är du omistlig man;\nDu båd vill och kan mer än någon ann\nde unga hjärtan binda,\nOch kärlekens snara på dina strängar står;\nVarje ton du slår, du ett hjärta får,\natt konstigt sammanlinda.\nJust på en minut, små ögon bliva blinda,\nOch flickorna till slut, de bli så trinda.\n- - - Hur du bullrar!\nMen Nymphen kullrar, och du skrattar med din trut.\n146\nJag älskar de sköna, men Vinet ändå mer;\nJag på båda ser, och åt båda ler,\nmen skiljer ändå båda.\nEn nymf i det gröna, och Vin i gröna glas;\nLika gott kalas, båda om mig dras.\nGe stråken mera kåda;\nConfonium tag där uti min gröna låda;\nOch Vinet står ju här. Jag är i våda.\n- - - Supa, dricka\nOch ha sin flicka, är vad Sankte Fredman lär.\n147\nFredmans epistel N:o 9 Käraste bröder,\nsystrar och vänner\nText och musik: Carl Michael Bellman\nVers 1\nKäraste bröder, systrar och vänner,\nsi, fader Berg, han skruvar och spänner\nsträngarna på fiolen.\nOch stråken han tar i hand.\nÖgat är borta, näsan är kluven:\nSi hur han står och spottar på skruven,\nölkannan står på stolen.\nNu knäpper han lite grand,\n- - - grinar mot solen,\n- - - pinar fiolen.\n- - - han sig förvillar, drillar ibland.\nKäraste bröder, dansa på tå,\nhandskar i hand och hattarna på!\nSi på jungfru Lona\nröda band i skona,\nnya strumpor, himmelsblå!\n148\nFredmans epistel N:o 48: Solen glimmar\nblank och trind\nSolen glimmar blank och trind,\nvattnet likt en spegel;\nSmåningom uppblåser vind\ni de fallna segel;\nVimpeln sträcks, och med en år\nOlle på en höbåt står;\nKerstin ur kajutan går,\nskjuter lås och regel.\nSeglen fladdra, skutan går,\nJerker tar sin lyra.\nLyran brummar, böljan slår,\nallt med våld och yra;\nSkutan knarkar, bräcklig, gles,\nvimplens fläkt i toppen ses,\ntuppen gol så sträv och hes.\nNu slog klockan fyra.\nMovitz stöt åt dem i lurn,\nsom på skutan fara.\nOlle du vad kostar tjurn?\nLyssna vad de svara.\nHör var är ni hemma ni?\nIfrån Lovön komma vi\nmed grönsaker, silleri,\nMjölk och äpplen klara.\n149\nFredmans epistel N:o 82 Vila vid denna\nkälla\nText och musik: Carl Michael Bellman\nVers 1–2 & 4\nVila vid denna källa,\nvår lilla frukost vi framställa:\nRött vin med pimpinella\noch en nyss skjuten beckasin.\nKlang vad buteljer, Ulla!\nI våra korgar överstfulla,\ntömda i gräset rulla,\noch känn vad ångan dunstar fin.\nDitt middagsvin\nska vi ur krusen hälla,\nmed glättig min.\nVila vid denna källa,\nhör våra valthorns klang cousine.\n– – –\nValthornens klang cousine.\nPräktigt på fältet pråla,\nän hingsten med sitt sto och fåla,\nän tjurn han höres vråla,\noch stundom Lammet bräka tör;\nTuppen på taket hoppar,\nOch liksom hönan vingen loppar,\nsvalan sitt huvud doppar,\n150\noch Skatan skrattar på sin stör.\nLyft kitteln; hör.\nlåt kaffeglöden kola,\ndär nedanför.\nPräktigt på fältet pråla\nde ämnen som mest ögat rör.\n– – –\nSom mest vårt öga rör.\nVila vid denna källa,\nvår lilla frukost vi framställa:\nrött vin med pimpinella\noch en nyss skjuten beckasin.\nKlang vad buteljer, Ulla,\ni våra korgar överstfulla\ntömda i gräset rulla,\noch känn vad ångan dunstar fin!\nDitt middagsvin\nsku vi ur krusen hälla\nmed glättig min.\nVila vid denna källa,\nhör våra valthorns klang cousine.\n- - - Valthornens klang cousine.\n151\nFredmans sång N:o 10 Supa klockan över\ntolv\nText och musik: Carl Michael Bellman\nSupa klockan öfver tolf,\nLefva bland förryckta!\nJorden är mitt kammargolf,\nSolen är min lyckta!\nJag bryr mig om ingenting,\nBlott at hjernen löper kring\nLöper kring, löper kring, löper kring, löper kring,\nIntil dess hon domnar,\nOch jag fattig somnar.\nI min Farfars gamla rock,\nHål uppå armbågen,\nStår jag bland en lustig flock,\nSuper bara rågen,\nTar mig ur de vackra krus\nMorgon-, middags-, afton-rus\nAfton-rus, afton-rus, afton-rus, afton-rus,\nOch så blir jag röder\nSom de ägta bröder.\nStode salig Far min opp,\nOch mig hörde hicka,\nSade han: min gosse, topp!\n152\nVi sku brorskål dricka.\nJa min Bror, så svarte jag:\nDrick med mig til ljusan dag\nLjusan dag, ljusan dag, ljusan dag, ljusan dag,\nSedan må du ila\nÅter til din hvila.\nMen min strupe vil bli full,\nTål ej denna torken;\nGuld ej annat är än mull,\nGubbar ta ur korken;\nLåtom oss i ro och fred\nSvälja sista klunken ned,\nKlunken ned, klunken ned, klunken ned, klunken ned,\nOch oss sedan döda\nI det våta röda.\n153\nFredmans sång N:o 21 Så lunkar vi så\nsmåningom\nText och musik: Carl Michael Bellman\nVers 1, 2, 7 & 8\nSå lunka vi så småningom\nFrån Bacchi buller och tumult,\nNär döden ropar: Granne kom,\nDitt timglas är nu fullt.\nDu gubbe fäll din krycka ner,\nOch du, du yngling, lyd min lag,\nDen skönsta nymf som mot dig ler\nInunder armen tag.\nTycker du att graven är för djup?\nNå, välan, så tag dig då en sup.\nTag dig sen dito en, dito två, dito tre,\nSå dör du nöjdare.\nDu vid din remmare och press,\nRödbrusig och med hatt på sned,\nSnart skrider fram din likprocess\nI några svarta led.\nOch du som pratar där så stort,\nMed band och stjärnor på din rock,\nRe’n snickarn kistan färdig gjort,\nOch hyvlar på dess lock.\n154\nTycker du…\nMen du som till din återfärd,\nIfrån det du till bordet gick,\nEj klingat för din raska värd,\nFastän han ropar: Drick!\nDriv sådan gäst från mat och vin,\nKör honom med sitt anhang ut,\nOch sen med en ovänlig min,\nRyck remmarn ur hans trut.\nTycker du…\nSäg är du nöjd, min granne säg,\nSå prisa världen nu till slut;\nOm vi ha en och samma väg,\nSå följoms åt; drick ut.\nMen först med vinet rött och vitt\nFör vår värdinna bugom oss,\nOch halkom sen i graven fritt,\nVid aftonstjärnans bloss.\nTycker du…\n155\nFredmans sång N:o 64 Fjäriln vingad syns\npå Haga\nText och musik: Carl Michael Bellman\nVers 1 & 4\nFjäriln vingad syns på Haga,\nMellan dimmors frost och dun,\nSig sitt gröna skjul tillaga,\nOch i blomman, sin paulun;\nMinsta kräk i kärr och syra,\nNyss af Solens värma väckt,\nTil en ny högtidlig yra\nEldas vid Zephirens flägt.\nVad gudomligt lust att röna\ninom en så ljuvlig park,\ndå man hälsad av sin sköna,\nögnas av en mild monark!\nVarje blick hans öga skickar,\nlockar tacksamhetens tår;\nrörd och tjust av dessa blickar,\nsjälv den trumpne glättig går.\n156\n\nTaube\nSjösala vals\nText & musik: Evert Taube\nRönnerdahl han skuttar med ett skratt ur sin säng.\nSolen står på Orrberget. Sunnanvind brusar.\nRönnerdahl han valsar över Sjösala äng.\n- Hör min vackra visa, kom sjung min refräng!\nTärnan har fått ungar och dyker i min vik,\nur alla gröna dungar hörs finkarnas musik,\noch se, så många blommor\nsom redan slagit ut på ängen!\nGullviva, mandelblom, kattfot och blå viol.\nRönnerdahl han virvlar sina lurviga ben\nunder vita skjortan som viftar kring vaderna.\nLycklig som en lärka uti majsolens sken,\nsjunger han för ekorrn, som gungar på gren!\n- Kurre, kurre, kurre! Nu dansar Rönnerdahl!\nKoko! Och göken ropar uti hans gröna dal\noch se, så många blommor\nsom redan slagit ut på ängen!\nGullviva, mandelblom, kattfot och blå viol.\nRönnerdahl han binder utav blommor en krans,\nbinder den kring håret, det gråa och rufsiga,\nvalsar in i stugan och har lutan till hands,\nväcker frun och barnen med drill och kadans.\n160\n- Titta! ropar ungarna, pappa är en brud,\nmed blomsterkrans i håret och nattskjortan till skrud!\nOch se, så många blommor\nsom redan slagit ut på ängen!\nGullviva, mandelblom, kattfot och blå viol.\nRönnerdahl är gammal, men han valsar ändå!\nRönnerdahl har sorger och ont om sekiner.\nSällan får han rasta – han får slita för två.\nHur han klarar skivan kan ingen förstå -\ningen, utom tärnan i viken (hon som dök)\noch ekorren och finken och vårens första gök\noch blommorna, de blommor\nsom redan slagit ut på ängen.\nGullviva, mandelblom, kattfot och blå viol.\n161\nFritiof och Carmencita\nText & musik: Evert Taube\nSamborombon, en liten by förutan gata,\nden ligger inte långt från Rio de la Plata,\nnästan i kanten\nav den blåa Atlanten,\noch med Pampas bakom sig\nmånga hundra gröna mil,\ndit kom jag ridande en afton i april\nför jag ville dansa tango.\nDragspel, fiol och mandolin\nhördes från krogen och i salen steg jag in,\ndär på bänken i mantilj\noch med en ros vid sin barm\nsatt den bedårande lilla Carmencita.\nMamman, värdinnan satt i vrån,\nhon tog mitt ridspö,\nmin pistol och min manton.\nJag bjöd upp och Carmencita sa:\n- Si gracias, senor,\nVámos á bailár, este tango!\n- Carmencita, lilla vän,\nhåller du utav mig än?\nFår jag tala med din pappa och din mamma,\njag vill gifta mig med dig, Carmencita!\n- Nej, Don Fritiof Andersson,\n162\nkom ej till Samborombon,\nom ni hyser andra planer när det gäller mig,\nän att dansa tango!\n- Ack, Carmencita, gör mig inte så besviken,\njag tänkte skaffa mig ett jobb här i butiken,\nsköta mig noga, bara spara och knoga,\ninte spela och dricka men bara älska dig.\nSäg Carmencita, är det ändå blott med mig,\nsäg som du vill dansa tango.\n- Nej, Fritiof, ni förstår musik,\nmen jag tror inte ni kan stå i en butik\noch förresten sa min pappa\njust idag att han visste\nvem som snart skulle fria till hans dotter.\nEn som har tjugotusen kor\noch en estancia som är förfärligt stor.\nHan har prisbelönta tjurar,\nhan har oxar, får och svin,\noch han dansar underbar tango.\n- Carmencita, lilla vän,\nakta dig för rika män!\nLyckan den bor ej i oxar eller kor,\noch den kan heller inte köpas för pengar.\nMen min kärlek gör dig rik,\nskaffa mig ett jobb i er butik!\nOch när vi blir gifta söta ungar ska du få,\nsom kan dansa tango.\n163\nFritiof Anderssons paradmarsch\nText & musik: Evert Taube\nHär kommer Fritiof Andersson, det snöar på hans hatt,\nhan går med spel, han går med sång!\nHej, mina lustiga bröder!\nDet knarrar under klackarna, det är en vinternatt.\nHej, om du vill,\nsäg bara till,\nså går vi hem till Söder!\nO, bugen er i bylingar i bucklor och batong\noch ställen er på sidorna, för gränden den är trång!\nDär går en här som frös och svalt men segrade ändå,\nden går med sång, den går med spel\ntill Spanien och Bordeaux.\nDär går en här, där går en hop, en liten, men en god,\nden går i ur, den går i skur!\nHej, mina lustiga bröder!\nDen kräver vin och kyssar och den kräver drakars blod!\nHej, om du vill,\nsäg bara till,\nså går vi hem till Söder!\nO, bugen er i borgare i Birka och Borås\noch ställ er här på sidorna. Trumpet och valthorn, blås!\nDär går en här som frös och svalt men segrade ändå,\nden går med sång, den går med spel\n164\ntill Spanien och Bordeaux.\nPå vägarna vi vandra och på böljorna vi gå,\nvi gå med spel, vi gå med sång!\nHej, mina lustiga bröder!\nI alla sorter väder som Vår Herre hittar på!\nHej, om du vill,\nsäg bara till,\nså går vi hem till Söder!\nO, buga dig du brisande Biscaya där vi gå!\nVårt skepp är själva Friheten, besättningen är blå!\nDen seglade och frös och svalt men segrade ändå,\nden går med sång, den går med spel\ntill Spanien och Bordeaux.\n165\nÄnglamark\nText & musik: Evert Taube\nKalla den änglamarken\neller himlajorden om du vill,\njorden vi ärvde och lunden den gröna,\nvildrosor och blåsippor\noch lindblommor och kamomill,\nlåt dem få leva, de är ju så sköna!\nLåt barnen dansa som änglar kring lönn och alm,\nleka tittut mellan blommande grenar,\nlåt fåglar leva och sjunga för oss sin psalm,\nlåt fiskar simma kring bryggor och stenar!\nSluta att utrota skogarnas alla djur,\nlåt örnen flyga, låt rådjuren löpa!\nLåt sista älven som brusar i vår natur\nbrusa alltjämt mellan älvar och gran och fur.\nKalla den änglamarken\neller himlajorden om du vill,\njorden vi ärvde och lunden den gröna,\nvildrosor och blåsippor\noch lindblommor och kamomill\n166\n\nIndex\n99 bottles of beer ………………………………………. 114\n1600-talet ……………………………………………….. 83\nA\nAuld lang syne …………………………………………. 111\nB\nBalladen om den kaxiga myran …………………………. 72\nBiskop Franzéns bordsvisa ……………………………… 80\nBlå och vit ………………………………………………. 44\nBordeaux, Bordeaux ……………………………………. 60\nBort allt vad OD gör ……………………………………. 78\nC\nCalmarevisan ……………………………………………. 24\nCrambamboli ……………………………………………. 62\nD\nDe brevitate vitae ………………………………………. 18\nDen lille mand …………………………………………. 108\nDet var i vår ungdoms fagraste vår ……………………… 11\nDet var en go' gammel bondemand ……………………. 112\nDjungelpunsch …………………………………………. 104\nDom som är nyktra ……………………………………… 48\nDo-Re-Mi ………………………………………………. 114\nDu käre lille snickerbo …………………………………. 140\nE\nEn kalmarit …  vindens sussilull och sussilo\ndig svara var i världen de bästa flickor bo.\n\nDet är flickorna i Småland..."],["Blå och Vit","",2,1,["kalmar","nation"],"Innan jag blev kalmarit\nVar världen svart och vit,\nOch allting verkade vara ganska skit\n\nMen sen kom jag hit,\nOch smaka denna sprit\nOch nu har allting färg\nNär jag blitt kalmarit"],["En get av smör","",4,1,["parodi","jul"],"Jag kan visa dig mjölk\nFetthalt, skummande, kära\nMen om du skulle tjärna\nFår du något gjort av guld\n\nJag kan karva med dig\nSkapa ett vackert alster\nStälla det på vårt julbord\nDen står stolt så alla ser\n\nEn get av smöööör\nEn julgestalt av margarin\nDen kan ej brännas ner\nMen smälta snabbt\nI djupet av din mun\n\nEn get av smöööör (släng fan inte bort)\nEn julgestalt av margarin\nPå ett vörtbröd ditt\nEn liten klick\nAllt glider in så fin","Melodi: En helt ny värld"],["Avlatsbrevet","",4,1,["parodi","snapsvisor"],"Till söndagsbönen färdas jag och står vid kyrkans port\nJag vill betala avlatsbrev och bli benådad fort\nFadern sade, \"inte mitt barn,\nför jag har blivit lutheran\"\nBehåll din peng du lille dräng,\nOch läs guds bok istället sen.\n\nNej detta var ju inte bra, jag är analfabet,\nOch plötsligt har jag pengar kvar, men vad gör väll det?\nMånga flaskor togs till gemak,\nMen utanför ett äktenskap.\nFader skäms nog om han ser.\nNu ska jag sluta synda mer.","Melodi: Snickerboa"],["Ostkakans lov","",4,1,["parodi","ostkaka","mat"],"Sätt nu fram i Gillesalen\nav en gul och gräddad färg,\nformen ljuvligt söt och malen,\nuppå faten hela berg!\nBlott ostkaka vill jag smaka,\nnöjd och glad till sista stund,\n/: När mot mig de Gouda Feta\nLe som gästerna från Lund :/\n\nUnder Smålands sol måhända\ngrädden tjocknar än en gång;\nvart vi oss i världen vända\nfinns ej kaka sån och lång!\nNordbon gnager Parmesanen,\ndansken drömmer Danablå,\n/: Men ostkakan mig dock tjusar,\nfår min själ att smälta på. :/\n\nI min ungdoms fröjd och gamman,\nsom i ålderns fina mejeri,\ndenna kaka band mig samman,\nmed så mången kalmarit.\nDärför när vi Småland nalkas\nsamlas vi för ostig smak.\n/: Bröder, låt oss ljuvligt svalkas\nav den ädla ostkaksmat! :/","Melodi: Rhenvinets lov"],["Inte nog av Ostkaka","",4,1,["parodi","ostkaka","mat"],"För jag kan inte få nog av ostkaka,\nalla sätt jag smakat på var gott.\nNär man väl vill lyxa,\ntar man fram sin sked,\nFrödinges tack, på bordet den satt, nej ingen kaka sitter fel!\n\nFör jag kan inte få nog av ostkaka,\nnej inte fast jag ätit som ett svin.\nVarje gång jag smakar,\nkänner jag mig rar,\nDet är bara ostkakan som är sig lik!\n\nJa, det är bara ostkakan som är sig liiiik!\nAllt det andra smakar bara mer fabrik!\nSäg mig minns du Wexiö stad?\nGlöm bort det är du rar,\nför det är bara ostkakan som är sig lik!\n\nFör jag kan inte få nog av ostkaka\nFast jag försökt att spara'n till imorr'n,\nTy hur jag än gömde,\nden bakom lite mjöl,\nså fann jag den sen — och la grädde på den, ja ingen kaka finns nu mer!\n\nFör jag kan inte få nog av ostkaka,\nnej jag behärskar ej min aptit-teknik!\nVårt lilla kök om du ser,\ndet står där knappt nå mer,\nför det är bara ostkakan som är sig lik!\n\nFör jag kan inte få nog av ostkaka,\nnej trots att jag fått magknip av min flit.\nNu om jag kaka ser,\nså känns det rätt så fel,\nför det är bara ostkakan som är sig lik!\n\nJa, det är bara ostkakan som är sig liiiik!\nAll ostkaka har fått mig att må skit.\nTill toakön härnäst,\nden längsta som man sett,\nför det är bara ostkakan som är sig lik!","Melodi: Far, jag kan inte få upp min kokosnöt"],["Sång till ostkakan","",4,1,["parodi","ostkaka"],"Du goda du gula du smarriga rätt\nSom sprungit ur Smålands djupa skogar\nVi Frödinge tackar för allt de gjort för oss\nFör all inspiration och all ostkaka!\nFör att vi får av ostkakan nu smaka!\n\nVi glömmer ej heller allt det som hör till\nVi sjunger för goda tillbehöret\nFör grädden och sylten och all ost som hör den till.\nFör det är hela helheten som gör'et\nSå ge mig nu ett lass med hela köret!","Melodi: Du gamla Du fria"],["Å ostkaka","",4,1,["parodi","ostkaka"],"Å ostkakor\nÅ ostkakor\nDet är vad vi vill se\nVi vill äta dem,\nFörtära dem\nOch ätas det skall de\nÅ ostkakor\nÅ ostkakor\nVad roligt att få ses\nSnart kommer refrängen\nSå sjung så du blir hes\n\nÅ ostkaka, å ostkaka, å ostka-ka-ka\nÅ ostkaka, å ostkaka, å ostka-ka-ka","Melodi: Små grodorna"],["Osten smakar","",4,1,["parodi","ost"],"Osten smakar fint i våra salar,\nGouda skivor passar bra det med.\nBrie´n mild ner i våra magar,\noch Camembert ger ett mjukt franskt besked.\n\nSnart är ostens tid, när löpen stelnar,\nmjölkens fett blir ostmassans poesi.\nLagrad Grevé i runda källarvalven,\nmognar nötigt – söt av harmoni.","Melodi: Vintern rastat"],["Cheese in a bottle","",4,1,["parodi","engelska","ost"],"If I could save cheese in a bottle,\nThe first thing that I'd like to do,\nIs to savor each bite,\n'Til my ability to taste 'gone away,\nJust to share cheese with you.\n\nIf I could make Brie last forever,\nIf Gouda could make wishes come true,\nI'd age every wheel\nlike a treasure and then,\nAgain, I would share cheese with you.\n\nBut there never seems to be enough time,\nTo taste all the cheeses we want to do,\nOnce you find them,\nI've aged enough wheels to know\nThat you're the one I want to go\nThrough cheese with.\n\nIf I had a box just for cheeses,\nAnd wheels that were aged to perfection,\nThe box would be empty,\nExcept for the memory of how,\nI shared cheese with you.","Melody: Time in a bottle"],["Möbelsnickarens Snapsvisa","Ola Ljunggren Bergeå",4,1,["snapsvisor","parodi"],"När folk ska fästa ett tyg på stolen\ntar de fram tejpen och häftpistolen\nMen jag har lärt vad som funkar bäst:\nJag slår i nubben, då blir det fäst!","Melodi: Apladalen i Värnamo"],["Mer öl (omskriven)","",4,1,["parodi","kalmar","klubbverk"],"Jag är en klubbverk person med takt och ton\nMåttfull och balanserad\nJag är tyst och still och det ska mycket till\nInnan jag blir exalterad\n\nMen jag har en last som håller mig fast\nI ett järngrepp varje klubbsläpp\nVid kvällens slut när ölen åkt ut\nOch städet är sista slitet jag vill ha\n\nMer öl, ge mig\nMer öl, jag vill ha\nMer öl, ge mig\nMer öl\n\nVakter som inte tjafsar\nBob hund på Kalmar live\nKablar som inte trasslar\nVill jag ha mer\n\nMer folk på klubb som bara dyker opp\nKrävs fler nödutgångar snarast\nSå ge mig tretti grader kallt, köer överallt\nTill dansgolvet de då spanar\n\nJag vill ha takterrass, korv i stora lass\nToaletter som fungerar\nLive och band som ackompangemang\nPå alla Kalmars kvällar, jag vill ha\n\nMer öl, ge mig…\n\nGe mig ännu en chans, ge mig ännu mera dans\nGe mig glowsticks som håller länge\nGe mig bayerskt öl i hela Kalmar Sund\nOch mera vin på sexor\n\nGe mig mera snaps och mera köttfärs\nSom har tinat ifrån frysen\nExtrema evenemang, längre långdans\nOch till sist en stad i ljusen, jag vill ha\n\nMer öl, ge mig…","Melodi: Mer jul"]]};

    id:       r[0],
    title:    r[1] || '',
    artist:   r[2] || '',
    category: r[3] || '',
    bookId:   r[4] || '',
    tags:     hasTags ? r[5] : [],
    lyrics:   hasTags ? (r[6] || '') : (r[5] || ''),
    meta_str: hasTags ? (r[7] || '') : (r[6] || ''),
    _seed:    false,
  };
}

// ── STORAGE HELPERS ──────────────────────────────────────────────────────────
const LS = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v)   => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { toast('Storage full!', true); } },
  del: (k)      => { try { localStorage.removeItem(k); } catch {} },
};

function lsSize() {
  let n = 0;
  try { for (let k in localStorage) { if (localStorage.hasOwnProperty(k)) n += (localStorage[k].length + k.length) * 2; } } catch {}
  return n;
}

function updateStorBadge() {
  const bytes = lsSize();
  const kb = (bytes / 1024).toFixed(1);
  const pct = Math.min(100, bytes / (5 * 1024 * 1024) * 100);
  document.getElementById('storTxt').textContent = kb + ' KB';
  document.getElementById('storFill').style.width = pct + '%';
  document.getElementById('storFill').style.background = pct > 80 ? 'var(--a1)' : pct > 50 ? 'var(--a4)' : 'var(--a2)';
}

// ── VERSION CHECK & MIGRATION ────────────────────────────────────────────────
function checkVersion() {
  const stored = LS.get('lv_v', null);
  if (stored === APP_VERSION) return;            // up to date

  if (stored !== null) {
    // Stale version: keep user data, discard anything that depends on seed ids
    // Favs/recent reference seed ids which may have changed index → clear them
    LS.del('lv_favs');
    LS.del('lv_recent');
    // User songs and user books survive unchanged
    toast('✨ Library updated! Your songs and books are preserved.', false, 3500);
  }
  LS.set('lv_v', APP_VERSION);
}

// ── STATE ────────────────────────────────────────────────────────────────────
checkVersion();

// User songs stored compactly, unpacked at runtime
const USER_SONG_ROWS = LS.get('lv_user_songs', []);
let userSongs = USER_SONG_ROWS.map(unpackUserSong);

// User books (user-created only; seed books come from SEED_BOOKS)
let userBooks = LS.get('lv_user_books', []);

// Mutable user state — small, always persisted
let favs   = LS.get('lv_favs',   []);
let recent = LS.get('lv_recent', []);
let dark   = LS.get('lv_theme',  'dark') !== 'light';

// Runtime: merged view (seed + user, never re-serialised as a whole)
let allSongs = []; buildAllSongs();
let allBooks = [...SEED_BOOKS, ...userBooks];

// UI state
let curCat = 'all', curTag = null, curBook = null, curSongId = null, pendTags = [];
let editSongId = null;
let hiddenSeedIds = LS.get('lv_hidden_seeds', []);
function buildAllSongs() { allSongs = [...SEED_SONGS.filter(s => !hiddenSeedIds.includes(s.id)), ...userSongs]; }

const BOOK_COLORS = ['#ff3c6e','#7b61ff','#00e5b0','#ffb830','#00c8ff','#ff8c42','#a8ff3e','#ff61b0'];
const CAT_COLORS  = {
  'Dryckesvisor':'#ffb830','Högtidligt':'#ff3c6e','Kalmar & Tradition':'#00c8ff',
  'Lindgren':'#ff61b0','Omskrivna Texter':'#a8ff3e','Punschen':'#00c8ff',
  'Snapsvisor':'#7b61ff','Ut i Calmare län':'#00e5b0','Utrikes':'#ff8c42',
  'Våra vänner':'#a8ff3e','Worship':'#ff3c6e','Gospel':'#7b61ff',
  'Hymn':'#ffb830','Christmas':'#00e5b0',
};

// ── PERSIST HELPERS ──────────────────────────────────────────────────────────
function saveUserSongs() {
  LS.set('lv_user_songs', userSongs.map(packUserSong));
  updateStorBadge();
}
function saveUserBooks() {
  LS.set('lv_user_books', userBooks);
  updateStorBadge();
}
function saveFavs()   { LS.set('lv_favs',   favs);   updateStorBadge(); }
function saveRecent() { LS.set('lv_recent', recent); updateStorBadge(); }

// ── THEME ────────────────────────────────────────────────────────────────────
if (!dark) document.body.classList.add('light');
function toggleTheme() {
  dark = !dark;
  document.body.classList.toggle('light', !dark);
  LS.set('lv_theme', dark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
}
if (!dark) document.getElementById('themeBtn').textContent = '☀️';

// ── UTILS ────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function catColor(c)  { return CAT_COLORS[c] || '#888'; }
function bookColor(id){ const b = allBooks.find(x => x.id === id); return b ? b.color : '#7b61ff'; }

function toast(msg, warn, dur) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (warn ? ' warn' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), dur || 2600);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() { renderSidebar(); renderBooksShelf(); renderRecent(); renderGrid(); renderTagFilters(); updateStorBadge(); }

function getSongsForBook(bid) { return allSongs.filter(s => s.bookId === bid); }

function renderSidebar() {
  document.getElementById('bAll').textContent = allSongs.length;
  document.getElementById('bFav').textContent = favs.length;
  const bl = document.getElementById('booksList');
  bl.innerHTML = allBooks.map(b => {
    const bsongs = getSongsForBook(b.id);
    const cats = {};
    bsongs.forEach(s => { cats[s.category] = (cats[s.category]||0) + 1; });
    const isOpen = curBook === b.id;
    const allActive = curCat === 'book_' + b.id && curBook === b.id ? ' active' : '';
    const catsHtml = Object.entries(cats).map(([cat, cnt]) => {
      const a = curCat === cat && curBook === b.id ? ' active' : '';
      return '<div class="sbi' + a + '" onclick="filterBookCat(\'' + b.id + '\',\'' + cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\',this)" title="' + esc(cat) + '">' +
        '<span class="cdot" style="background:' + catColor(cat) + '"></span>' +
        '<span class="sbi-label">' + esc(cat) + '</span>' +
        '<span class="sb-badge">' + cnt + '</span></div>';
    }).join('');
    return '<div>' +
      '<div class="bk-hdr' + (isOpen?' open':'') + '" onclick="toggleBookSb(\'' + b.id + '\',this)" title="' + esc(b.name) + '">' +
        '<span class="bk-arrow">▶</span><span style="font-size:1rem">📚</span>' +
        '<span class="sbi-label" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(b.name) + '</span>' +
        '<span class="sb-badge">' + bsongs.length + '</span>' +
      '</div>' +
      '<div class="bk-cats' + (isOpen?' open':'') + '" id="bcats-' + b.id + '">' +
        '<div class="sbi' + allActive + '" onclick="selectBook(\'' + b.id + '\')" title="All in book">' +
          '<span style="font-size:.85rem">📖</span><span class="sbi-label"> All in book</span></div>' +
        catsHtml +
      '</div></div>';
  }).join('');
}

function toggleBookSb(bid, el) {
  const el2 = document.getElementById('bcats-' + bid);
  const open = el2.classList.toggle('open');
  el.classList.toggle('open', open);
}
function selectBook(bid) {
  curBook = bid; curCat = 'book_' + bid; curTag = null;
  document.querySelectorAll('.sbi').forEach(i => i.classList.remove('active'));
  render();
}
function filterBookCat(bid, cat, el) {
  curBook = bid; curCat = cat; curTag = null;
  document.querySelectorAll('.sbi').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  renderGrid(); renderTagFilters();
}
function filterCat(cat, el) {
  curCat = cat; curBook = null; curTag = null;
  document.querySelectorAll('.sbi').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  renderGrid(); renderSidebar(); renderTagFilters();
}
function filterTag(tag) {
  curTag = curTag === tag ? null : tag;
  renderGrid(); renderTagFilters();
}

function renderBooksShelf() {
  const row = document.getElementById('bksRow');
  row.innerHTML = allBooks.map(b => {
    const cnt = getSongsForBook(b.id).length;
    const sel = curBook === b.id ? ' sel' : '';
    const yr  = b.year ? '<div class="bk-yr">' + esc(b.year) + '</div>' : '';
    return '<div class="bk-card' + sel + '" onclick="selectBook(\'' + b.id + '\')">' +
      '<div class="bk-spine" style="background:linear-gradient(90deg,' + b.color + ',' + b.color + '88)"></div>' +
      '<div class="bk-body"><div class="bk-name">' + esc(b.name) + '</div>' +
      '<div class="bk-cnt">' + cnt + ' songs</div>' + yr + '</div></div>';
  }).join('');
}

function renderRecent() {
  const sec = document.getElementById('recSec');
  const strip = document.getElementById('recStrip');
  const items = recent.map(id => allSongs.find(s => s.id === id)).filter(Boolean).slice(0,8);
  if (!items.length) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  strip.innerHTML = items.map(s => {
    const c = catColor(s.category);
    return '<div class="rc" onclick="openSong(\'' + s.id + '\')" style="background:linear-gradient(135deg,' + c + '20,' + c + '35);border:1.5px solid ' + c + '44;">' +
      '<div class="rc-t" style="color:' + c + '">' + esc(s.title) + '</div>' +
      '<div class="rc-a">' + esc(s.artist || '—') + '</div>' +
      '<div class="rc-c" style="color:' + c + '">' + esc(s.category) + '</div></div>';
  }).join('');
}

function getFilterBase() {
  if (curCat === 'favorites') return allSongs.filter(s => favs.includes(s.id));
  if (curBook && curCat === 'book_' + curBook) return allSongs.filter(s => s.bookId === curBook);
  if (curBook) return allSongs.filter(s => s.bookId === curBook && s.category === curCat);
  if (curCat === 'all') return allSongs;
  return allSongs.filter(s => s.category === curCat);
}
function getFiltered() {
  let list = getFilterBase();
  if (curTag) list = list.filter(s => (s.tags||[]).includes(curTag));
  const q = document.getElementById('srchIn').value.toLowerCase().trim();
  if (q) list = list.filter(s =>
    s.title.toLowerCase().includes(q) ||
    (s.artist||'').toLowerCase().includes(q) ||
    s.lyrics.toLowerCase().includes(q) ||
    (s.tags||[]).some(t => t.toLowerCase().includes(q))
  );
  return list;
}
function getAllTags() {
  const src = getFilterBase(), tags = new Set();
  src.forEach(s => (s.tags||[]).forEach(t => tags.add(t)));
  return [...tags];
}
function renderTagFilters() {
  document.getElementById('tagFs').innerHTML = getAllTags().map(t =>
    '<div class="chip' + (curTag===t?' active':'') + '" onclick="filterTag(\'' + t + '\')">#' + esc(t) + '</div>'
  ).join('');
}

function renderGrid() {
  const list = getFiltered();
  let titleText = curCat==='all' ? 'All Songs' : curCat==='favorites' ? '⭐ Favorites' :
                  curCat.startsWith('book_') ? 'All in Book' : curCat;
  if (curBook && curCat === 'book_' + curBook) {
    const b = allBooks.find(x => x.id === curBook);
    if (b) titleText = b.name;
  }
  document.getElementById('gridTitle').innerHTML =
    esc(titleText) + ' <span class="sec-sub" id="gridCnt">' + list.length + ' song' + (list.length!==1?'s':'') + '</span>';
  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div class="empty"><div class="empty-ico">🎶</div><p>No songs found</p></div>'; return; }
  grid.innerHTML = list.map(s => {
    const c = catColor(s.category);
    const isFav = favs.includes(s.id);
    const preview = s.lyrics.split('\n').slice(0,3).join('\n');
    const tagsHtml = (s.tags||[]).slice(0,2).map(t => '<span class="tag">#' + esc(t) + '</span>').join('');
    return '<div class="sc" onclick="openSong(\'' + s.id + '\')">' +
      '<div class="sc-strip" style="background:linear-gradient(90deg,' + c + ',' + c + '66)"></div>' +
      '<div class="sc-hd"><div><div class="sc-ti">' + esc(s.title) + '</div><div class="sc-ar">' + esc(s.artist||'—') + '</div></div>' +
      '<button class="fav" onclick="event.stopPropagation();toggleFav(\'' + s.id + '\')">' + (isFav?'⭐':'☆') + '</button></div>' +
      '<div class="sc-pre">' + esc(preview) + '</div>' +
      '<div class="sc-ft"><span class="tag" style="background:' + c + '25;color:' + c + '">' + esc(s.category) + '</span>' +
      tagsHtml +
      '<button class="cpbtn" id="cp-' + s.id + '" onclick="event.stopPropagation();copySong(\'' + s.id + '\')">📋 Copy</button>' +
      '</div></div>';
  }).join('');
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
let sT;
function handleSearch() { clearTimeout(sT); sT = setTimeout(() => { renderGrid(); showSugg(); }, 120); }
function showSugg() {
  const q = document.getElementById('srchIn').value.toLowerCase().trim();
  const box = document.getElementById('sugg');
  if (!q) { box.classList.remove('open'); return; }
  const m = allSongs.filter(s => s.title.toLowerCase().includes(q) || (s.artist||'').toLowerCase().includes(q)).slice(0,6);
  if (!m.length) { box.classList.remove('open'); return; }
  box.innerHTML = m.map(s =>
    '<div class="sug-i" onmousedown="selSugg(\'' + s.id + '\')">' +
    '<span style="font-size:1.2rem">🎵</span>' +
    '<div><div class="sug-t">' + esc(s.title) + '</div>' +
    '<div class="sug-m">' + esc(s.artist||'') + (s.artist?' · ':'') + esc(s.category) + '</div></div></div>'
  ).join('');
  box.classList.add('open');
}
function hideSugg() { setTimeout(() => document.getElementById('sugg').classList.remove('open'), 150); }
function selSugg(id) {
  const s = allSongs.find(x => x.id===id);
  if (s) { document.getElementById('srchIn').value = s.title; document.getElementById('sugg').classList.remove('open'); openSong(id); }
}

// ── SONG MODAL ───────────────────────────────────────────────────────────────
function openSong(id) {
  const s = allSongs.find(x => x.id===id); if (!s) return;
  curSongId = id;
  recent = [id, ...recent.filter(r => r!==id)].slice(0,12);
  saveRecent(); renderRecent();
  document.getElementById('mTi').textContent  = s.title;
  document.getElementById('mAr').textContent  = s.artist ? 'by ' + s.artist : s.category;
  document.getElementById('mMe').textContent  = s.meta_str || '';
  const c = catColor(s.category);
  document.getElementById('mTags').innerHTML  =
    '<span class="tag" style="background:' + c + '25;color:' + c + '">' + esc(s.category) + '</span>' +
    (s.tags||[]).map(t => '<span class="tag">#' + esc(t) + '</span>').join('');
  document.getElementById('mBody').textContent = s.lyrics;
  updateMFav();
  const btn = document.getElementById('cpAllBtn');
  btn.textContent = '📋 Copy Lyrics'; btn.classList.remove('copied');
  document.getElementById('songModal').classList.add('open');
}
function closeModal() { document.getElementById('songModal').classList.remove('open'); }
function updateMFav() { document.getElementById('mFavIco').textContent = favs.includes(curSongId) ? '⭐' : '☆'; }
function toggleFavModal() { toggleFav(curSongId); updateMFav(); }
function copyAll() {
  const s = allSongs.find(x => x.id===curSongId); if (!s) return;
  navigator.clipboard.writeText(s.lyrics).then(() => {
    const b = document.getElementById('cpAllBtn');
    b.textContent = '✓ Copied!'; b.classList.add('copied');
    setTimeout(() => { b.textContent = '📋 Copy Lyrics'; b.classList.remove('copied'); }, 2200);
  });
}
function toggleFav(id) {
  favs = favs.includes(id) ? favs.filter(f => f!==id) : [...favs, id];
  saveFavs(); renderGrid(); renderSidebar();
}
function copySong(id) {
  const s = allSongs.find(x => x.id===id); if (!s) return;
  navigator.clipboard.writeText(s.lyrics).then(() => {
    const btn = document.getElementById('cp-' + id);
    if (btn) { btn.textContent = '✓ Copied!'; btn.classList.add('copied'); }
    toast('Lyrics copied!');
    setTimeout(() => { if (btn) { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); } }, 2200);
  });
}

// ── ADD SONG ─────────────────────────────────────────────────────────────────
function openUpload() {
  editSongId = null;
  document.getElementById('uplModalTitle').textContent = 'Add New Song';
  document.getElementById('uplSaveBtn').textContent = 'Save Song';
  pendTags = [];
  ['fTi','fAr','fLy','fCat'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('tagWrap').querySelectorAll('.tpill').forEach(e => e.remove());
  document.getElementById('fBk').innerHTML = allBooks.map(b =>
    '<option value="' + b.id + '">' + esc(b.name) + '</option>').join('');
  document.getElementById('uplModal').classList.add('open');
}
function openEdit(id) {
  const s = allSongs.find(x => x.id === id);
  if (!s) return;
  editSongId = id;
  document.getElementById('uplModalTitle').textContent = 'Edit Song';
  document.getElementById('uplSaveBtn').textContent = 'Save Changes';
  pendTags = [...(s.tags || [])];
  document.getElementById('fTi').value = s.title;
  document.getElementById('fAr').value = s.artist || '';
  document.getElementById('fLy').value = s.lyrics;
  document.getElementById('fCat').value = s.category || '';
  document.getElementById('tagWrap').querySelectorAll('.tpill').forEach(e => e.remove());
  const input = document.getElementById('tagIn');
  pendTags.forEach(tag => {
    const pill = document.createElement('div');
    pill.className = 'tpill';
    pill.innerHTML = '#' + esc(tag) + ' <button onclick="rmTag(\'' + tag + '\',this)">Ã—</button>';
    document.getElementById('tagWrap').insertBefore(pill, input);
  });
  document.getElementById('fBk').innerHTML = allBooks.map(b =>
    '<option value="' + b.id + '"' + (b.id === s.bookId ? ' selected' : '') + '>' + esc(b.name) + '</option>').join('');
  closeModal();
  document.getElementById('uplModal').classList.add('open');
}
function closeUpload() { document.getElementById('uplModal').classList.remove('open'); }
function handleTagIn(e) {
  const input = document.getElementById('tagIn');
  if (e.key==='Enter' || e.key===',') {
    e.preventDefault();
    const v = input.value.replace(',','').trim().toLowerCase();
    if (v && !pendTags.includes(v)) {
      pendTags.push(v);
      const pill = document.createElement('div');
      pill.className = 'tpill';
      pill.innerHTML = '#' + esc(v) + ' <button onclick="rmTag(\'' + v + '\',this)">×</button>';
      document.getElementById('tagWrap').insertBefore(pill, input);
    }
    input.value = '';
  }
}
function rmTag(tag, btn) { pendTags = pendTags.filter(t => t!==tag); btn.parentElement.remove(); }
function saveSong() {
  const title  = document.getElementById('fTi').value.trim();
  const lyrics = document.getElementById('fLy').value.trim();
  if (!title || !lyrics) { toast('Title and lyrics required!', true); return; }
  const tagIn = document.getElementById('tagIn').value.trim();
  if (tagIn) pendTags.push(tagIn.toLowerCase());
  const bookId = document.getElementById('fBk').value;
  const songData = {
    title, lyrics,
    artist:   document.getElementById('fAr').value.trim(),
    category: document.getElementById('fCat').value.trim() || 'Other',
    tags:     [...new Set(pendTags)],
    bookId,
    _seed:    false,
  };
  if (editSongId) {
    const original = allSongs.find(x => x.id === editSongId);
    const updated = { ...songData, id: original && original._seed ? ('u_' + Date.now()) : editSongId, meta_str: original ? (original.meta_str || '') : '' };
    if (original && original._seed) {
      hiddenSeedIds.push(editSongId);
      LS.set('lv_hidden_seeds', hiddenSeedIds);
      userSongs.push(updated);
    } else {
      userSongs = userSongs.map(s => s.id === editSongId ? updated : s);
    }
    toast('"' + title + '" updated!');
  } else {
    userSongs.push({ ...songData, id: 'u_' + Date.now(), meta_str: '' });
    toast('"' + title + '" added!');
  }
  buildAllSongs();
  saveUserSongs(); closeUpload(); render();
}

// ── CREATE BOOK ───────────────────────────────────────────────────────────────
function openBookUpload()  { document.getElementById('bkuModal').classList.add('open'); }
function closeBookUpload() { document.getElementById('bkuModal').classList.remove('open'); }
function saveBook() {
  const name = document.getElementById('bkN').value.trim();
  if (!name) { toast('Book name required!', true); return; }
  const color = BOOK_COLORS[allBooks.length % BOOK_COLORS.length];
  const newBook = { id:'book_'+Date.now(), name, year:document.getElementById('bkY').value.trim(), desc:document.getElementById('bkD').value.trim(), color };
  userBooks.push(newBook);
  allBooks = [...SEED_BOOKS, ...userBooks];
  saveUserBooks();
  ['bkN','bkY','bkD'].forEach(id => document.getElementById(id).value = '');
  closeBookUpload(); render();
  toast('Book "' + name + '" created!');
}

// ── OVERLAY CLOSE ─────────────────────────────────────────────────────────────
['songModal','uplModal','bkuModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});
document.addEventListener('keydown', e => {
  if (e.key==='Escape') ['songModal','uplModal','bkuModal'].forEach(id => document.getElementById(id).classList.remove('open'));
});

render();

// ── SIDEBAR BEHAVIOUR ─────────────────────────────────────────────────────────
function toggleMobSidebar() {
  const sb = document.querySelector('.sidebar');
  const ov = document.getElementById('sbOverlay');
  const open = sb.classList.toggle('mob-open');
  ov.classList.toggle('open', open);
}

(function initSidebar() {
  const sb = document.querySelector('.sidebar');
  if (window.innerWidth > 680) {
    sb.classList.add('collapsed');
    sb.addEventListener('mouseenter', () => sb.classList.remove('collapsed'));
    sb.addEventListener('mouseleave', () => sb.classList.add('collapsed'));
  }
})();
</script>
